version: '3.8'

services:
  kedo-core-daemon:
    image: kenwell/kedo-engine:4.73.1
    container_name: kenwell-redo-daemon
    privileged: true
    restart: always
    ports:
      - "8080:8080"
      - "2376:2376"
    environment:
      - APP_ENV=${APP_ENV}
      - KENWELL_SYSTEM_LOCK=${SYSTEM_CORE_LOCK}
      - COMPATIBILITY_MODE=${COMPATIBILITY_MODE}
    volumes:
      - /var/run/kenwell:/var/run/kenwell
      - /var/lib/kenwell:/var/lib/kenwell
      - ~/.ssl:/etc/ssl/kenwell:ro

  portainer-control-panel:
    image: portainer/portainer-ce:latest
    container_name: kenwell-control-panel
    restart: always
    ports:
      - "9000:9000"
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/var/data

volumes:
  portainer_data: